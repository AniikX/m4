<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github</title>
    <link
      rel="stylesheet"
      href="https://pro.fontawesome.com/releases/v5.15.2/css/all.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <label>
      <input placeholder="Введите логин" id="searchValue"/>
      <button id="searchBtn">Найти</button>
    </label>

    <div id="card" class="none">
      <img src="https://avatars.githubusercontent.com/u/63047682?v=4" />
      <h1>Логин</h1>
      <p>Описание</p>
      <nav>
        <div>
            <i class="fas fa-map-marker-alt"></i>
            <span>Калининград</span>
        </div>
        <div>
            <i class="fad fa-book"></i>
            <span>10</span>
        </div>
        <div>
            <i class="fas fa-heart" style="color: pink"></i>
            <span>4</span>
        </div>
      </nav>
      <a href="">Перейти</a>
    </div>
    <div id="load" class="none"></div>

    <script src="script.js"></script>
  </body>
</html>
